defaults:
  - _self_
  - model: small

ngpus: 4
tokens: 50257

training:
  batch_size: 32   # to be changed
  accum: 4
  n_iters: 200   # to be changed
  snapshot_freq: 100   # to be changed
  log_freq: 1
  eval_freq: 20
  snapshot_freq_for_preemption: 1000
  weight: standard
  snapshot_sampling: False   # to be changed
  ema: 0.9999

data:
  train: data/s1k_train_trunc.jsonl   # set to the variant produced by prepare_s1k.py
  valid: data/s1k_val_trunc.jsonl
  pad_in_loss: False   # True: also supervise the EOS padding (stronger stop signal)

graph:
  type: absorb
  file: data
  report_all: False

noise:
  type: loglinear
  sigma_min: 1e-4
  sigma_max: 20

sampling:
  predictor: euler
  steps: 128
  noise_removal: True

eval:
  batch_size: 32
  perplexity: False   # to be changed
  perplexity_batch_size: 32

optim:
  weight_decay: 0
  optimizer: AdamW
  lr: 1e-4
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  warmup: 10
  grad_clip: 1.

hydra:
  run:
    dir: exp_local/sft/${now:%Y.%m.%d}/${now:%H%M%S}
  sweep:
    dir: exp/sft/${now:%Y.%m.%d}/${now:%H%M%S}
    subdir: ${hydra.job.num}
