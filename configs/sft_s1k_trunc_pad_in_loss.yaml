defaults:
  - _self_
  - model: small

# s1K SFT config (data produced by prepare_s1k.py)
# Hardware: 3 x 48GB GPU.
# Data size: ~900 train / 100 val. Token length median ~700, max 1024.
#   1 optimizer step consumes `training.batch_size` sequences.
#   1 epoch  ~= 900 / batch_size = 900 / 48 ~= 19 steps.
#   n_iters 120 ~= 6.4 epochs.

ngpus: 3   # set to your hardware; batch_size must be divisible by ngpus*accum
tokens: 50257

training:
  batch_size: 48     # sequences per optimizer step (global); 48 % (3*1) == 0
  accum: 1           # micro_batch = batch_size / (ngpus*accum) = 16 per GPU
  n_iters: 120       # ~6.4 epochs over 900 samples
  snapshot_freq: 40          # checkpoints at step 40/80/120
  log_freq: 1
  eval_freq: 10              # ~every 0.5 epoch
  snapshot_freq_for_preemption: 40
  weight: standard
  snapshot_sampling: True    # dump conditional (SFT) generations at each snapshot
  ema: 0.9999

data:
  train: data/s1k_train_trunc.jsonl   # or s1k_train_filtered.jsonl
  valid: data/s1k_val_trunc.jsonl     # or s1k_val_filtered.jsonl
  pad_in_loss: True   # True: also supervise EOS padding (stronger stop signal)

wandb:
  enabled: True
  project: sft_s1k_trunc_pad_in_loss
  entity: SEDD_SFT           # null -> your default wandb entity
  mode: online       # online | offline | disabled

graph:
  type: absorb
  file: data
  report_all: False

noise:
  type: loglinear
  sigma_min: 1e-4
  sigma_max: 20

sampling:
  predictor: euler
  steps: 128
  noise_removal: True

eval:
  batch_size: 48    # 48 % (3*1) == 0
  perplexity: False
  perplexity_batch_size: 48

optim:
  weight_decay: 0
  optimizer: AdamW
  lr: 1e-4       # larger global batch (48) tolerates the base lr
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  warmup: 12     # ~0.6 epoch
  grad_clip: 1.

hydra:
  run:
    dir: exp_local/sft_s1k/${now:%Y.%m.%d}/${now:%H%M%S}
  sweep:
    dir: exp/sft_s1k/${now:%Y.%m.%d}/${now:%H%M%S}
    subdir: ${hydra.job.num}
